services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  kafka:
    image: bitnamilegacy/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnamilegacy/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tg_pipeline
      POSTGRES_USER: tg_pipeline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tg_pipeline_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_pipeline -d tg_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  init-kafka:
    image: bitnamilegacy/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic telegram.raw --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic telegram.raw.dlt --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic pipeline.filtered --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic config.sources.changed --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic config.pipelines.changed --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic config.users.telegram.changed --partitions 1 --replication-factor 1
        echo "All Kafka topics created"
    restart: "no"

  # ─── Backend Services ─────────────────────────────────────────────────────────

  config-api:
    build:
      context: .
      dockerfile: apps/config-api/Dockerfile
    env_file: apps/config-api/.env
    environment:
      DATABASE_URL: postgres://tg_pipeline:${POSTGRES_PASSWORD:-tg_pipeline_dev}@postgres:5432/tg_pipeline
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  telegram-collector:
    build:
      context: .
      dockerfile: apps/telegram-collector/Dockerfile
    env_file: apps/telegram-collector/.env
    environment:
      DATABASE_URL: postgres://tg_pipeline:${POSTGRES_PASSWORD:-tg_pipeline_dev}@postgres:5432/tg_pipeline
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
      config-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  filter-engine:
    build:
      context: .
      dockerfile: apps/filter-engine/Dockerfile
    env_file: apps/filter-engine/.env
    environment:
      DATABASE_URL: postgres://tg_pipeline:${POSTGRES_PASSWORD:-tg_pipeline_dev}@postgres:5432/tg_pipeline
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  realtime-gateway:
    build:
      context: .
      dockerfile: apps/realtime-gateway/Dockerfile
    env_file: apps/realtime-gateway/.env
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://tg_pipeline:${POSTGRES_PASSWORD:-tg_pipeline_dev}@postgres:5432/tg_pipeline
    depends_on:
      init-kafka:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend-shell:
    build:
      context: .
      dockerfile: apps/frontend-shell/Dockerfile
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend-viewer:
    build:
      context: .
      dockerfile: apps/frontend-viewer/Dockerfile
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend-pipeline:
    build:
      context: .
      dockerfile: apps/frontend-pipeline/Dockerfile
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ─── Nginx (API Gateway + static) ─────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      config-api:
        condition: service_healthy
      realtime-gateway:
        condition: service_healthy
      frontend-shell:
        condition: service_healthy

volumes:
  kafka_data:
  postgres_data:
  redis_data:
