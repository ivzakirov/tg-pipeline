events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;

    # REST API — strip /api/ prefix before proxying
    location /api/ {
      set $upstream http://config-api:3001;
      rewrite ^/api/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket — pass full /ws/socket.io path unchanged; gateway listens at that path
    location /ws/ {
      set $upstream http://realtime-gateway:3002;
      proxy_pass $upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # Viewer MFE — strip /remotes/viewer/ prefix
    location /remotes/viewer/ {
      set $upstream http://frontend-viewer:80;
      rewrite ^/remotes/viewer/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
    }

    # Pipeline MFE — strip /remotes/pipeline/ prefix
    location /remotes/pipeline/ {
      set $upstream http://frontend-pipeline:80;
      rewrite ^/remotes/pipeline/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
    }

    # Shell (host MFE) — no URI suffix: original URI passed as-is
    location / {
      set $upstream http://frontend-shell:80;
      proxy_pass $upstream;
      proxy_set_header Host $host;
    }
  }
}
