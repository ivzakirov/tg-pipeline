events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s; # Docker DNS

  upstream config_api {
    server config-api:3001;
  }

  upstream realtime_gateway {
    server realtime-gateway:3002;
  }

  upstream frontend_shell {
    server frontend-shell:80;
  }

  upstream frontend_viewer {
    server frontend-viewer:80;
  }

  upstream frontend_pipeline {
    server frontend-pipeline:80;
  }

  server {
    listen 80;

    # REST API
    location /api/ {
      proxy_pass http://config_api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket
    location /ws/ {
      proxy_pass http://realtime_gateway/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # Viewer MFE assets (Module Federation remote)
    location /remotes/viewer/ {
      proxy_pass http://frontend_viewer/;
      proxy_set_header Host $host;
    }

    # Pipeline MFE assets (Module Federation remote)
    location /remotes/pipeline/ {
      proxy_pass http://frontend_pipeline/;
      proxy_set_header Host $host;
    }

    # Shell (host MFE) — catch-all
    location / {
      proxy_pass http://frontend_shell/;
      proxy_set_header Host $host;
      try_files $uri $uri/ /index.html;
    }
  }
}
